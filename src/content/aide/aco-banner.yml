titre: "Candidature sous r\xE9serve d'obtention du Bac"
texte: "Vous candidatez avec vos relev\xE9s de Terminale. En cas d'admission, elle sera conditionnelle (ACO) : vous fournirez votre dipl\xF4me via le compl\xE9ment de dossier, et la condition sera lev\xE9e apr\xE8s v\xE9rification par l'\xE9tablissement."
